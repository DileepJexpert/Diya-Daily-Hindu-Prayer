name: CI

# Quality gate on every push to main and every PR: the content catalog must be
# internally consistent and the app must typecheck.

on:
  push:
    branches: [main]
  pull_request: {}

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run content:check
      - run: npx tsc --noEmit
